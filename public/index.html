<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON MANDS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, #E8F5E9 0%, #F1F8E9 100%);
            min-height: 100vh;
            padding-bottom: 70px;
        }

        .container {
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        /* Header Profile */
        .profile-header {
            background: linear-gradient(135deg, #0088cc 0%, #0099ee 100%);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 12px rgba(0, 136, 204, 0.2);
        }

        .profile-avatar {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 700;
        }

        .profile-info {
            flex: 1;
            color: white;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .profile-id {
            font-size: 13px;
            opacity: 0.9;
        }

        .profile-balance {
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Stats Card */
        .stats-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .stats-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-limit {
            background: #E8F5E9;
            color: #4CAF50;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Crypto List */
        .crypto-list {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-all {
            color: #0088cc;
            font-size: 13px;
            font-weight: 500;
            text-decoration: none;
        }

        .crypto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .crypto-item:last-child {
            border-bottom: none;
        }

        .crypto-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .crypto-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
        }

        .crypto-btc { background: linear-gradient(135deg, #F7931A, #FFB347); }
        .crypto-eth { background: linear-gradient(135deg, #627EEA, #8BA5F5); }
        .crypto-bnb { background: linear-gradient(135deg, #F0B90B, #FFD700); }
        .crypto-sol { background: linear-gradient(135deg, #00FFA3, #00C896); }
        .crypto-doge { background: linear-gradient(135deg, #C2A633, #E6C85C); }
        .crypto-ton { background: linear-gradient(135deg, #0088cc, #0099ee); }

        .crypto-info {
            min-width: 100px;
        }

        .crypto-name {
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }

        .crypto-symbol {
            font-size: 12px;
            color: #999;
        }

        .crypto-right {
            text-align: right;
        }

        .crypto-price {
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }

        .crypto-change {
            font-size: 13px;
            font-weight: 600;
        }

        .price-up {
            color: #4CAF50;
        }

        .price-down {
            color: #F44336;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 14px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            color: #999;
            text-decoration: none;
            font-size: 11px;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: #0088cc;
        }

        .nav-icon {
            font-size: 22px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* Refresh Button */
        .refresh-btn {
            background: linear-gradient(135deg, #0088cc 0%, #0099ee 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .refresh-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-avatar" id="userAvatar">K</div>
            <div class="profile-info">
                <div class="profile-name" id="userName">Kinandra</div>
                <div class="profile-id" id="userId">ID: 1750653290</div>
            </div>
            <div class="profile-balance">
                💰 <span id="userBalance">0</span>
            </div>
        </div>

        <!-- Stats Card -->
        <div class="stats-card">
            <div class="stats-header">
                <div class="stats-title">
                    📊 Today's Tasks
                </div>
                <div class="stats-limit">
                    0/20
                </div>
            </div>
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <div class="empty-text">No tasks available</div>
            </div>
        </div>

        <!-- Crypto Prices -->
        <div class="crypto-list">
            <div class="section-title">
                💎 Crypto Prices
                <a href="#" class="view-all" onclick="refreshPrices(); return false;">View All</a>
            </div>
            <div id="cryptoList">
                <div class="loading">Loading prices...</div>
            </div>
            <button class="refresh-btn" onclick="refreshPrices()">
                🔄 Refresh Prices
            </button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="navTo('home')">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="navTo('withdraw')">
            <span class="nav-icon">💳</span>
            <span>Withdraw</span>
        </div>
        <div class="nav-item" onclick="navTo('refer')">
            <span class="nav-icon">👥</span>
            <span>Refer</span>
        </div>
        <div class="nav-item" onclick="navTo('profile')">
            <span class="nav-icon">👤</span>
            <span>Profile</span>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Get user data from Telegram
        const user = tg.initDataUnsafe?.user;
        
        if (user) {
            const fullName = `${user.first_name} ${user.last_name || ''}`.trim();
            document.getElementById('userName').textContent = fullName;
            document.getElementById('userId').textContent = `ID: ${user.id}`;
            
            const initial = user.first_name?.charAt(0).toUpperCase() || 'U';
            document.getElementById('userAvatar').textContent = initial;
        }

        // Crypto data
        const cryptos = [
            { symbol: 'BTC', name: 'Bitcoin', iconClass: 'crypto-btc' },
            { symbol: 'ETH', name: 'Ethereum', iconClass: 'crypto-eth' },
            { symbol: 'BNB', name: 'Binance Coin', iconClass: 'crypto-bnb' },
            { symbol: 'SOL', name: 'Solana', iconClass: 'crypto-sol' },
            { symbol: 'DOGE', name: 'Dogecoin', iconClass: 'crypto-doge' },
            { symbol: 'TON', name: 'Toncoin', iconClass: 'crypto-ton' }
        ];

        // Fetch crypto prices
        async function fetchPrices() {
            try {
                const response = await fetch('https://api.mexc.com/api/v3/ticker/24hr');
                const data = await response.json();
                
                const prices = [];
                cryptos.forEach(crypto => {
                    const ticker = data.find(t => t.symbol === `${crypto.symbol}USDT`);
                    if (ticker) {
                        prices.push({
                            ...crypto,
                            price: parseFloat(ticker.lastPrice),
                            change: parseFloat(ticker.priceChangePercent)
                        });
                    }
                });
                
                updateCryptoList(prices);
            } catch (error) {
                console.error('Error fetching prices:', error);
                document.getElementById('cryptoList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div class="empty-text">Failed to load prices</div>
                    </div>
                `;
            }
        }

        // Update crypto list UI
        function updateCryptoList(prices) {
            const list = document.getElementById('cryptoList');
            list.innerHTML = '';

            prices.forEach(crypto => {
                const item = document.createElement('div');
                item.className = 'crypto-item';
                
                const changeClass = crypto.change >= 0 ? 'price-up' : 'price-down';
                const changeSign = crypto.change >= 0 ? '+' : '';
                
                // Format price
                let priceStr;
                if (crypto.price < 1) {
                    priceStr = `$${crypto.price.toFixed(6)}`;
                } else if (crypto.price < 100) {
                    priceStr = `$${crypto.price.toFixed(2)}`;
                } else {
                    priceStr = `$${crypto.price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                }
                
                item.innerHTML = `
                    <div class="crypto-left">
                        <div class="crypto-icon ${crypto.iconClass}">${crypto.symbol.charAt(0)}</div>
                        <div class="crypto-info">
                            <div class="crypto-name">${crypto.name}</div>
                            <div class="crypto-symbol">${crypto.symbol}/USDT</div>
                        </div>
                    </div>
                    <div class="crypto-right">
                        <div class="crypto-price">${priceStr}</div>
                        <div class="crypto-change ${changeClass}">${changeSign}${crypto.change.toFixed(2)}%</div>
                    </div>
                `;
                
                list.appendChild(item);
            });
        }

        // Refresh prices
        function refreshPrices() {
            tg.HapticFeedback.impactOccurred('light');
            document.getElementById('cryptoList').innerHTML = '<div class="loading">Loading...</div>';
            fetchPrices();
        }

        // Navigation function
        function navTo(page) {
            tg.HapticFeedback.impactOccurred('light');
            
            if (page === 'home') {
                // Already on home
                return;
            }
            
            // Show coming soon message
            tg.showPopup({
                title: 'Coming Soon',
                message: `${page.charAt(0).toUpperCase() + page.slice(1)} feature will be available soon!\n\nStay tuned for updates!`,
                buttons: [{type: 'ok'}]
            });
        }

        // Initial fetch
        fetchPrices();

        // Auto refresh every 30 seconds
        setInterval(fetchPrices, 30000);
    </script>
</body>
</html>
